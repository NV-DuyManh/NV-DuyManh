name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: NV-DuyManh
          template: classic
          
          # PHẦN QUAN TRỌNG: Tắt hết các thông tin thừa
          base: "" 
          config_timezone: Asia/Ho_Chi_Minh
          
          # Ép sang chế độ Dark Mode cực đẹp
          config_display: large
          config_padding: 0, 5%
          design_title_color: "#8A2BE2" # Màu tím giống Typing SVG của bạn
          
          # Chỉ hiển thị thanh ngôn ngữ (Languages)
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, tex, dockerfile, makefile
          plugin_languages_details: percentage # Chỉ hiện % cho gọn
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
