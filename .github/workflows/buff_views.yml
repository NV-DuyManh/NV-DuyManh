name: Super Fast View Buff

on:
  schedule:
    - cron: '* * * * *' # Chạy liên tục mỗi 1 phút (Max tốc độ của GitHub)
  workflow_dispatch: # Nút bấm để Duy Mạnh tự chạy tay bất cứ lúc nào

jobs:
  buff_fast:
    runs-on: ubuntu-latest
    steps:
      - name: Turbo Requests
        run: |
          # Bắn 200 requests mỗi lần chạy
          for i in {1..200}
          do
            # Giả lập User-Agent ngẫu nhiên để vượt bộ lọc spam
            USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/$((RANDOM%20+100)).0.0.$((RANDOM%5000)) Safari/537.36"
            
            # Thêm tham số cache phá vỡ bộ nhớ đệm của GitHub
            curl -s -A "$USER_AGENT" "https://komarev.com/ghpvc/?username=NV-DuyManh&cache=$(date +%s%N)$i" > /dev/null
            
            # In ra để theo dõi tiến độ
            if [ $((i % 50)) -eq 0 ]; then echo "Đã bắn được $i views..."; fi
          done
          echo "Hoàn thành đợt buff này! Đợi 1 phút sau hệ thống tự chạy tiếp."
